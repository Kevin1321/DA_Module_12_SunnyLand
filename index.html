<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunnyLand</title>
    <link rel="shortcut icon" href="assets/sprites/characters/Foxy/Victory/Victory.png" type="image/x-icon">
    <link rel="stylesheet" href="styles/colors.css">
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="style.css">

    <script src="scripts/Engine/Animation.js"></script>
    <script src="scripts/Engine/AudioAssets.js"></script>
    <script src="scripts/Engine/AudioManager.js"></script>
    <script src="scripts/Engine/CollisionLayers.js"></script>
    <script src="scripts/Engine/GameObject.js"></script>
    <script src="scripts/Engine/UIObject.js"></script>
    <script src="scripts/Engine/InputManager.js"></script>
    <script src="scripts/Engine/SpriteAssets.js"></script>
    <script src="scripts/Engine/Util.js"></script>

    <script src="scripts/GameObjects/Characters/Character.js"></script>
    <script src="scripts/GameObjects/Characters/Player/Projectile.js"></script>
    <script src="scripts/GameObjects/Characters/Player/Player.js"></script>
    <script src="scripts/GameObjects/Characters/Enemies/Enemy.js"></script>
    <script src="scripts/GameObjects/Characters/Enemies/Boss.js"></script>
    <script src="scripts/GameObjects/Characters/Enemies/Minion.js"></script>

    <script src="scripts/GameObjects/StaticObjects/Background.js"></script>
    <script src="scripts/GameObjects/StaticObjects/Level.js"></script>
    <script src="scripts/GameObjects/StaticObjects/Prop.js"></script>
    <script src="scripts/GameObjects/StaticObjects/Goal.js"></script>

    <script src="scripts/GameObjects/StaticObjects/PickUps/PickUp.js"></script>
    <script src="scripts/GameObjects/StaticObjects/PickUps/Cherry.js"></script>
    <script src="scripts/GameObjects/StaticObjects/PickUps/Gem.js"></script>

    <script src="scripts/UIObjects/PlayerHUD.js"></script>

    <script src="scripts/Engine/World.js"></script>
    <script src="scripts/Modal.js"></script>
    <script src="scripts/Main.js"></script>
</head>

<body onload="main()">
    <header>
        <h1>Sunny Land</h1>
    </header>

    <main>
        <div class="background-layer-one">
            <div class="background-layer-two">

                <div id="game-controls">
                    <div id="audio-controls">
                        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.1"
                            oninput="AudioManager.SetVolume(parseFloat(this.value))">
                        <img id="mute-btn" src="assets/sprites/UI/audio-enabled.png"
                            onclick="AudioManager.ToggleMute()">
                        <button onclick="toggleFullscreen()">⛶</button>
                    </div>
                </div>

                <div id="canvas-container">
                    <canvas id="game-canvas" width="720" height="480"></canvas>
                    <div id="game-overlay">
                        <div id="game-banner"></div>
                        <button id="start-btn" onclick="startGame()">▶ Start</button>
                    </div>

                    <!-- Fullscreen UI -->
                    <div id="fullscreen-audio">
                        <input type="range" id="fs-volume-slider" min="0" max="1" step="0.01" value="0.1"
                            oninput="AudioManager.SetVolume(parseFloat(this.value))">
                        <img id="fs-mute-btn" src="assets/sprites/UI/audio-enabled.png"
                            onclick="AudioManager.ToggleMute()">
                    </div>

                    <div id="fullscreen-controls">
                        <div class="fs-btn-group">
                            <button class="fs-btn" id="btn-left" onpointerdown="InputManager.LEFT = true"
                                onpointerup="InputManager.LEFT = false">◀</button>
                            <button class="fs-btn" id="btn-right" onpointerdown="InputManager.RIGHT = true"
                                onpointerup="InputManager.RIGHT = false">▶</button>
                        </div>
                        <div class="fs-btn-group">
                            <button class="fs-btn" id="btn-jump" onpointerdown="InputManager.JUMP = true"
                                onpointerup="InputManager.JUMP = false">▲</button>
                            <button class="fs-btn" id="btn-shoot" onpointerdown="InputManager.SHOOT = true"
                                onpointerup="InputManager.SHOOT = false">⭐</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer>
        <p onclick="openModal('howToPlay')">How to play</p>
        <p onclick="openModal('licences')">Licences</p>
        <p onclick="openModal('imprint')">Imprint</p>
    </footer>

    <div id="modal-overlay" onclick="closeModal()">
        <div id="modal" onclick="event.stopPropagation()">
            <div id="modal-header">
                <button id="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modal-text"></div>
        </div>
    </div>

</body>

</html>
